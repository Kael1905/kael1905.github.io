<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kael | Dijital Kartvizit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --button-hover: #0ea5e9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .profile-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-color), #818cf8);
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
        }

        h1 { margin: 10px 0; font-size: 24px; }
        p { color: #94a3b8; margin-bottom: 25px; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .links { display: flex; flex-direction: column; gap: 15px; }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #334155;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .link-item:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .link-item i { font-size: 18px; }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card">
        <div class="avatar">
            <i class="fas fa-paw"></i>
        </div>
        
        <h1>Kael</h1>
        <p>🦝 Racoon Dev 💻</p>

        <div class="links">
            <a href="https://github.com/Kael1905" target="_blank" class="link-item">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="https://linkedin.com/in/ilke-deniz-karakaş-684843336" target="_blank" class="link-item">
                <i class="fab fa-linkedin"></i> LinkedIn
            </a>
            <a href="mailto:rownhy@gmail.com" class="link-item">
                <i class="fas fa-envelope"></i> Mail
            </a>
            <a href="https://t.me/Kael-Telegram-Adin" target="_blank" class="link-item">
                <i class="fas fa-paper-plane"></i> Telegram
            </a>
        </div>
    </div>

    <div class="footer">
        Scanned via NFC • 2026
    </div>
</div>

</body>
</html>
